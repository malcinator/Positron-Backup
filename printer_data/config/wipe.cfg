[gcode_macro CLEAN_NOZZLE]
description: Clean the nozzle at a fixed position
gcode:
    ###########################################################################
    # USERâ€‘ADJUSTABLE SETTINGS (IDIOTâ€‘PROOF EDITION)
    ###########################################################################
    {% set wipe_speed = 18000 %}        # Wiping speed (mm/min) â†’ 300 mm/s
    {% set travel_speed = 30000 %}      # Travel speed (mm/min) â†’ 500 mm/s
    {% set z_speed = 3000 %}            # Z movement speed (mm/min) -> 50 mm/s 
    # WIPE PAD COORDINATES â€” MUST MATCH YOUR PRINTER
    {% set x_start = 11.00 %}             # Begin X position
    {% set x_end   = 27.00 %}             # End X position
    {% set y_start = 0 %}             # Begin Y position
    {% set y_end   = 0 %}             # End Y position
    {% set z = 4.5 %}                   # Brush wipe height
    {% set loop_count = params.ITERATIONS|default(10)|int %} # Amount of wipes
    {% set temp       = params.TEMP|default(200)|int %}      # Wiper temperature
    {% set wait       = params.WAIT|default(60)|int %}       # Wait time before wipe in sec.
    ###########################################################################
    # SAFETY CHECK FOR SMALLER PRINTERS (Don't touch)
    ###########################################################################
    {% set xmin = printer.toolhead.axis_minimum.x %}
    {% set xmax = printer.toolhead.axis_maximum.x %}
    {% set ymin = printer.toolhead.axis_minimum.y %}
    {% set ymax = printer.toolhead.axis_maximum.y %}
    {% if x_start < xmin or x_start > xmax
       or x_end   < xmin or x_end   > xmax
       or y_start < ymin or y_start > ymax
       or y_end   < ymin or y_end   > ymax %}
        RESPOND TYPE=error MSG="CLEAN_NOZZLE aborted: wipe coordinates outside printer travel!"
        {action_raise_error("CLEAN_NOZZLE aborted: wipe coordinates outside printer travel!")}
    {% endif %}
    ###########################################################################
    # HOMING CHECK (Don't touch)
    ###########################################################################
    {% if printer.toolhead.homed_axes != "xyz" %}
        RESPOND MSG="Printer not homed, homing now"
        G28
    {% endif %}
    ###########################################################################
    # MOVE TO WIPE START (Don't touch)
    ###########################################################################
    M117 Moving to wipe start
    RESPOND MSG="Moving to wipe start"
    G90
    G0 X{x_start} Y{y_start} F{travel_speed}
    ###########################################################################
    # HEATING PHASE (Don't touch)
    ###########################################################################
    M117 Heating to {temp}C
    RESPOND MSG="Heating to {temp}C"
    M104 S{temp}
    M109 S{temp}
    G4 S{wait}
    ###########################################################################
    # WIPING PHASE (Don't touch)
    ###########################################################################
    M117 Cleaning Nozzle
    RESPOND MSG="Cleaning Nozzle"
    G0 Z{z} F{z_speed}
    {% for i in range(loop_count) %}
        G0 X{x_end}   Y{y_end}   F{wipe_speed}
        G0 X{x_start} Y{y_start} F{wipe_speed}
    {% endfor %}
    ###########################################################################
    # RETURN TO CENTER
    ###########################################################################
      # Lift nozzle
    G0 Z20 F{z_speed}
    # Move to center of bed (change X/Y here if your center is different)
    G0 X200 Y200 F{travel_speed} # Ajust to printer size (150 for 300mmÂ³, 200 for 400mmÂ³ and 250 for 500mmÂ³)


[gcode_macro _START_PRINT_BEFORE_HEATING_BED]
gcode:
    ###########################################################################
    # PARAMETERS
    ###########################################################################
    {% set target_idex_mode = params.IDEX_MODE|default("")|lower %}
    {% set initial_toolhead = params.T|default(default_toolhead)|int %}
    {% set both_toolheads = true if params.BOTH_TOOLHEADS|default(true)|lower=='true' else false %}

    ###########################################################################
    # CONFIG
    ###########################################################################
    {% set min_temp = printer["gcode_macro RatOS"].preheat_extruder_temp|float %}
    {% set max_temp = min_temp + 5 %}
    {% set speed = printer["gcode_macro RatOS"].macro_travel_speed|float * 60 %}
    {% set z_speed = printer["gcode_macro RatOS"].macro_z_speed|float * 60 %}
    {% set safe_home_x, safe_home_y = printer.ratos.safe_home_position %}
    {% set default_toolhead = printer["gcode_macro RatOS"].default_toolhead|default(0)|int %}
    {% set idex_mode = '' %}
    {% if printer["dual_carriage"] is defined %}
        {% set idex_mode = printer["dual_carriage"].carriage_1|lower %}
    {% endif %}
    {% set act_t = 1 if idex_mode == 'primary' else 0 %}

    ###########################################################################
    # AUTOMATED TOOLHEAD Z-OFFSET CALIBRATION CONFIG
    ###########################################################################
    {% set auto_z_offset_calibration = False %}
    {% if printer["dual_carriage"] is defined and printer["gcode_macro _VAOC"] is defined %}
        {% set is_fixed = true if printer["gcode_macro _VAOC"].is_fixed|default(true)|lower == 'true' else false %}
        {% if printer["gcode_macro _VAOC"].auto_z_offset_calibration|default("false")|lower == 'true' and is_fixed %}
            {% if target_idex_mode != "copy" and target_idex_mode != "mirror" %}
                {% if both_toolheads or initial_toolhead != default_toolhead %}
                    {% set auto_z_offset_calibration = True %}
                {% endif %}
            {% endif %}
        {% endif %}
    {% endif %}

    ###########################################################################
    # Z PROBE CONFIG
    ###########################################################################
    {% set beacon_contact_start_print_true_zero = true if printer["gcode_macro RatOS"].beacon_contact_start_print_true_zero|default(false)|lower == 'true' else false %}
    {% set is_stowable_probe = true if printer["gcode_macro RatOS"].z_probe|lower == 'stowable' else false %}

    ###########################################################################
    # PREHEAT EXTRUDER + FULL CLEAN_NOZZLE TAKEOVER (ONLY ON T0).
    ###########################################################################
    {% if printer["gcode_macro RatOS"].preheat_extruder|lower == 'true' %}
        {% if default_toolhead == 0 %}
            RATOS_ECHO MSG="Running CLEAN_NOZZLE for T0 preheat + wipe..."
            CLEAN_NOZZLE
           Drop nozzle temp to 150Â°C after wiping
            RATOS_ECHO MSG="Cooling nozzle to 150Â°C after wipe..."
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
        {% else %}
            RATOS_ECHO MSG="Preheat enabled but skipping wipe (not T0)..."
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={min_temp}
        {% endif %}
    {% endif %}
    ###########################################################################
    # PARK TOOLHEAD FOR HEAT SOAKING (STOCK)
    ###########################################################################
    {% if not is_stowable_probe %}
        {% if printer["dual_carriage"] is defined and act_t != default_toolhead %}
            _SELECT_TOOL T={default_toolhead} X={safe_home_x} Y={safe_home_y} TOOLSHIFT=True
        {% endif %}
        RATOS_ECHO MSG="Heat soaking z probe..."
        _MOVE_TO_SAFE_Z_HOME
        G0 Z2 F{z_speed}
    {% endif %}